vi:
  date:
    formats:
      default: "%d/%m/%Y"
      short: "%d/%m/%Y"
      long: "%d tháng %m, %Y"
  time:
    formats:
      default: "%d/%m/%Y %H:%M"
      short: "%d/%m %H:%M"
      long: "%d tháng %m, %Y lúc %H:%M"

en:
  date:
    formats:
      default: "%b %d, %Y"
      short: "%b %d, %Y"
      long: "%B %d, %Y"
  time:
    formats:
      default: "%b %d, %Y %H:%M"
      short: "%b %d, %H:%M"
      long: "%B %d, %Y at %H:%M"
