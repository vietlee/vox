:concurrency: 5
:queues:
  - [critical, 3]
  - [ai, 2]
  - [default, 1]
  - [mailers, 1]

:cron:
  subscription_expiry_reminder:
    cron: "0 8 * * *"
    class: SubscriptionExpiryReminderJob
    description: "Daily check for expiring subscriptions and send renewal reminders"
  monthly_free_reset:
    cron: "0 0 1 * *"
    class: MonthlyFreeResetJob
    description: "Reset survey/vote/feedback counts for all free workspaces on the 1st of each month"
  learner_daily_reminder:
    cron: "0 * * * * Asia/Ho_Chi_Minh"
    class: LearnerDailyReminderJob
    description: "Hourly: push nudge to learners at their chosen reminder hour; evening email nudge at 20:00"
