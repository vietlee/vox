upstream puma_vox {
  server unix:/var/www/vox/shared/tmp/sockets/puma.sock fail_timeout=0;
}

# Redirect HTTP → HTTPS
server {
  listen 80;
  server_name vox.czin.net;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name vox.czin.net;

  # SSL — managed by Certbot
  ssl_certificate     /etc/letsencrypt/live/vox.czin.net/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/vox.czin.net/privkey.pem;
  include             /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

  root /var/www/vox/current/public;

  # Security headers
  add_header X-Frame-Options        SAMEORIGIN;
  add_header X-Content-Type-Options nosniff;
  add_header X-XSS-Protection       "1; mode=block";
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Client upload limit — STT/video upload up to 2 GB (ElevenLabs limit)
  client_max_body_size 2G;

  # Allow slow clients to finish uploading large files (2 GB) before giving up.
  # Default is 60s between successive read operations — too tight for slow connections.
  client_body_timeout 300s;

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
  gzip_min_length 1000;

  # Static assets served directly
  location ^~ /assets/ {
    gzip_static on;
    expires 1y;
    add_header Cache-Control public;
    add_header Last-Modified "";
    add_header ETag "";
    break;
  }

  # Active Storage blobs
  location ^~ /rails/active_storage/ {
    proxy_pass         http://puma_vox;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }

  # STT endpoints — long-running: file upload to ElevenLabs can take several minutes.
  # Timeout chain: HTTParty read_timeout 600s < Puma worker_timeout 720s < proxy_read_timeout 780s
  # proxy_read_timeout here must be > Puma worker_timeout so Rails always responds before nginx cuts the wire.
  location ~ ^/stt/(transcribe|transcribe_url|transcribe_chunk) {
    proxy_pass            http://puma_vox;
    proxy_set_header      Host $host;
    proxy_set_header      X-Real-IP $remote_addr;
    proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header      X-Forwarded-Proto $scheme;
    proxy_read_timeout    780s;   # > Puma worker_timeout (720s)
    proxy_send_timeout    780s;   # time for nginx to push large file body to Puma
    proxy_connect_timeout  60s;
    proxy_request_buffering off;  # stream upload body to Puma immediately, don't buffer 2 GB in nginx RAM
    proxy_buffering       off;
    proxy_redirect        off;
  }

  # Sidekiq Web UI — basic auth protected
  location /sidekiq {
    proxy_pass         http://puma_vox;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  # Health check
  location /up {
    proxy_pass http://puma_vox;
    proxy_set_header Host $host;
    access_log off;
  }

  # All other requests → Puma
  location / {
    try_files $uri/index.html $uri @puma;
  }

  location @puma {
    proxy_pass         http://puma_vox;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 60s;
    proxy_buffering    off;
    proxy_redirect     off;
  }

  error_page 500 502 503 504 /500.html;
  error_page 404 /404.html;

  access_log /var/log/nginx/vox_access.log;
  error_log  /var/log/nginx/vox_error.log;
}
